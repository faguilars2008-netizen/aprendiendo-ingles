<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Learn the Colors</title>


<link rel="stylesheet" href="CSS/estilo_aprende.css">

</style>
</head>
<body>


<div class="container">

    <h1>Let's Learn the Colors!</h1>

    <p class="subtitle">
    Aprende los colores en inglés de una manera divertida 🎨
    </p>

    <!-- IMAGEN PRINCIPAL -->
    <img
    src="https://picsum.photos/1000/350"
    alt="Imagen de colores"
    class="main-image"
    >

    <!-- TARJETAS -->
    <div class="colors">

    <div class="card" onclick="playColor('Red')">
        <div class="circle" style="background:red"></div>
        <p>Red</p>
    </div>
    
    <div class="card" onclick="playColor('Orange')">
        <div class="circle" style="background:orange"></div>
        <p>Orange</p>
    </div>

    <div class="card" onclick="playColor('Yellow')">
        <div class="circle" style="background:yellow"></div>
        <p>Yellow</p>
    </div>

    <div class="card" onclick="playColor('Green')">
        <div class="circle" style="background:green"></div>
        <p>Green</p>
    </div>

    <div class="card" onclick="playColor('Blue')">
        <div class="circle" style="background:blue"></div>
        <p>Blue</p>
    </div>

    <div class="card" onclick="playColor('Purple')">
        <div class="circle" style="background:purple"></div>
        <p>Purple</p>
    </div>

    </div>

    <!-- BOTÓN -->
    <button class="btn" onclick="startGame()">
        Comenzar
    </button>

    <!-- MENSAJE -->
    <div id="message"></div>

</div>
